function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function makeChoices(correct,pool){
  const wrongs = shuffle(pool.filter(x => x !== correct)).slice(0,3);
  return shuffle([correct,...wrongs]);
}

let currentQuestion = 0;
let score = 0;
const totalQuestions = 30;
let shuffledQuiz = [];

function startQuiz(){
  shuffledQuiz = shuffle([...quizData]).slice(0,totalQuestions);
  currentQuestion = 0;
  score = 0;
  document.getElementById("score").textContent = score;
  showQuestion();
}

function showQuestion(){
  const q = shuffledQuiz[currentQuestion];

  document.getElementById("questionNum").textContent = currentQuestion + 1;
  document.getElementById("question").textContent = q.q;
  document.getElementById("result").textContent = "";

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  shuffle([...q.c]).forEach(choice=>{
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(btn,choice,q.a);
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(button,selected,correct){
  const buttons = document.querySelectorAll(".choices button");

  buttons.forEach(btn=>{
    btn.disabled = true;
    if(btn.textContent === correct){
      btn.classList.add("correct");
    }
  });

  if(selected === correct){
    score++;
    document.getElementById("score").textContent = score;
    document.getElementById("result").textContent = "???";
    button.classList.add("correct");
  }else{
    document.getElementById("result").textContent = "???? ??? " + correct;
    button.classList.add("wrong");
  }

  setTimeout(()=>{
    currentQuestion++;

    if(currentQuestion < totalQuestions){
      showQuestion();
    }else{
      showFinal();
    }
  },1200);
}

function showFinal(){
  document.getElementById("quizBox").style.display = "none";
  document.getElementById("finalScreen").style.display = "block";

}
