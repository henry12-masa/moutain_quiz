<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山クイズ200問</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:sans-serif;background:#f0fdf4;color:#222}
header{background:#15803d;color:white;text-align:center;padding:20px;font-size:32px;font-weight:bold}
.layout{display:flex;justify-content:center;gap:20px;padding:20px}
.ad-side{width:160px;min-height:600px;background:white;border-radius:14px;box-shadow:0 4px 12px #0002;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#777}
.main{width:720px}
.quiz-box,.bottom-ad,.final{background:white;border-radius:20px;padding:30px;box-shadow:0 8px 20px #0002;text-align:center}
.bottom-ad{height:120px;margin-top:25px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#777;font-weight:bold}
.top-info{display:flex;justify-content:space-between;font-size:18px;font-weight:bold}
.question{font-size:30px;font-weight:bold;margin:30px 0;line-height:1.5}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.choices button{border:none;border-radius:14px;padding:18px;font-size:18px;cursor:pointer;background:#dcfce7;font-weight:bold}
.choices button:hover{background:#86efac;transform:scale(1.03)}
.correct{background:#22c55e!important;color:white}
.wrong{background:#ef4444!important;color:white}
.result{margin-top:25px;font-size:24px;font-weight:bold;min-height:40px}
.final{display:none}
.restart-btn{border:none;background:#15803d;color:white;padding:16px 30px;border-radius:12px;font-size:20px;cursor:pointer}
@media(max-width:1000px){
.layout{flex-direction:column}
.ad-side{width:100%;min-height:100px}
.main{width:100%}
.choices{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>山クイズ200問</header>

<div class="layout">
  <div class="ad-side">広告エリア</div>

  <div class="main">
    <div class="quiz-box" id="quizBox">
      <div class="top-info">
        <div>問題 <span id="questionNum">1</span>/30</div>
        <div>スコア: <span id="score">0</span></div>
      </div>

      <div class="question" id="question"></div>
      <div class="choices" id="choices"></div>
      <div class="result" id="result"></div>
    </div>

    <div class="final" id="finalScreen">
      <h2>クイズ終了！</h2>
      <div class="score" id="finalScore"></div>
      <button class="restart-btn" onclick="restartQuiz()">もう一度遊ぶ</button>
    </div>

    <div class="bottom-ad">広告エリア</div>
  </div>

  <div class="ad-side">広告エリア</div>
</div>

<script>
const mountains = [
{n:"富士山",p:"山梨県・静岡県",h:"3776m",f:"日本一高い山"},
{n:"北岳",p:"山梨県",h:"3193m",f:"日本で2番目に高い山"},
{n:"奥穂高岳",p:"長野県・岐阜県",h:"3190m",f:"北アルプスの名峰"},
{n:"間ノ岳",p:"山梨県・静岡県",h:"3190m",f:"白峰三山の一つ"},
{n:"槍ヶ岳",p:"長野県・岐阜県",h:"3180m",f:"鋭い穂先のような山容"},
{n:"悪沢岳",p:"静岡県",h:"3141m",f:"南アルプスの高峰"},
{n:"赤石岳",p:"長野県・静岡県",h:"3121m",f:"赤石山脈の主峰級"},
{n:"涸沢岳",p:"長野県・岐阜県",h:"3110m",f:"穂高連峰の一角"},
{n:"北穂高岳",p:"長野県・岐阜県",h:"3106m",f:"穂高連峰の岩峰"},
{n:"大喰岳",p:"長野県・岐阜県",h:"3101m",f:"槍ヶ岳近くの高峰"},

{n:"前穂高岳",p:"長野県",h:"3090m",f:"穂高連峰の名峰"},
{n:"中岳",p:"長野県・岐阜県",h:"3084m",f:"槍ヶ岳周辺の山"},
{n:"荒川中岳",p:"静岡県",h:"3084m",f:"荒川三山の一つ"},
{n:"御嶽山",p:"長野県・岐阜県",h:"3067m",f:"信仰の山として有名"},
{n:"農鳥岳",p:"山梨県・静岡県",h:"3051m",f:"白峰三山の一つ"},
{n:"塩見岳",p:"長野県・静岡県",h:"3052m",f:"南アルプス中央部の名峰"},
{n:"仙丈ヶ岳",p:"長野県・山梨県",h:"3033m",f:"南アルプスの女王"},
{n:"乗鞍岳",p:"長野県・岐阜県",h:"3026m",f:"車道で高所まで行きやすい"},
{n:"立山",p:"富山県",h:"3015m",f:"日本三霊山の一つ"},
{n:"聖岳",p:"長野県・静岡県",h:"3013m",f:"南アルプス南部の高峰"},

{n:"剱岳",p:"富山県",h:"2999m",f:"岩と雪の殿堂"},
{n:"水晶岳",p:"富山県",h:"2986m",f:"黒部源流域の名峰"},
{n:"甲斐駒ヶ岳",p:"山梨県・長野県",h:"2967m",f:"白い花崗岩が特徴"},
{n:"木曽駒ヶ岳",p:"長野県",h:"2956m",f:"中央アルプス最高峰"},
{n:"白馬岳",p:"長野県・富山県",h:"2932m",f:"大雪渓で有名"},
{n:"薬師岳",p:"富山県",h:"2926m",f:"カール地形が有名"},
{n:"野口五郎岳",p:"長野県・富山県",h:"2924m",f:"北アルプス裏銀座の山"},
{n:"鷲羽岳",p:"長野県・富山県",h:"2924m",f:"黒部源流の山"},
{n:"大天井岳",p:"長野県",h:"2922m",f:"表銀座縦走路の山"},
{n:"西穂高岳",p:"長野県・岐阜県",h:"2909m",f:"新穂高ロープウェイ近く"},

{n:"八ヶ岳",p:"長野県・山梨県",h:"2899m",f:"赤岳を主峰とする山群"},
{n:"赤岳",p:"長野県・山梨県",h:"2899m",f:"八ヶ岳最高峰"},
{n:"白山",p:"石川県・岐阜県",h:"2702m",f:"日本三霊山の一つ"},
{n:"日光白根山",p:"栃木県・群馬県",h:"2578m",f:"関東以北最高峰"},
{n:"男体山",p:"栃木県",h:"2486m",f:"中禅寺湖の北にそびえる"},
{n:"磐梯山",p:"福島県",h:"1816m",f:"会津富士とも呼ばれる"},
{n:"安達太良山",p:"福島県",h:"1700m",f:"ほんとの空で知られる"},
{n:"蔵王山",p:"宮城県・山形県",h:"1841m",f:"樹氷で有名"},
{n:"月山",p:"山形県",h:"1984m",f:"出羽三山の一つ"},
{n:"鳥海山",p:"山形県・秋田県",h:"2236m",f:"出羽富士とも呼ばれる"},

{n:"岩木山",p:"青森県",h:"1625m",f:"津軽富士とも呼ばれる"},
{n:"八甲田山",p:"青森県",h:"1585m",f:"豪雪地帯の山"},
{n:"岩手山",p:"岩手県",h:"2038m",f:"南部富士とも呼ばれる"},
{n:"早池峰山",p:"岩手県",h:"1917m",f:"高山植物で有名"},
{n:"羊蹄山",p:"北海道",h:"1898m",f:"蝦夷富士とも呼ばれる"},
{n:"大雪山",p:"北海道",h:"2291m",f:"北海道最高峰の山域"},
{n:"阿蘇山",p:"熊本県",h:"1592m",f:"巨大カルデラで有名"},
{n:"霧島山",p:"宮崎県・鹿児島県",h:"1700m",f:"火山群として有名"},
{n:"桜島",p:"鹿児島県",h:"1117m",f:"活火山として有名"},
{n:"開聞岳",p:"鹿児島県",h:"924m",f:"薩摩富士とも呼ばれる"}
];

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function makeChoices(correct,pool){
  const wrongs = shuffle(pool.filter(x => x !== correct)).slice(0,3);
  return shuffle([correct,...wrongs]);
}

const mountainNames = mountains.map(x=>x.n);
const prefs = [...new Set(mountains.map(x=>x.p))];
const heights = [...new Set(mountains.map(x=>x.h))];
const features = mountains.map(x=>x.f);

let quizData = [];

mountains.forEach(item=>{
  quizData.push({
    q:`${item.n}がある都道府県は？`,
    a:item.p,
    c:makeChoices(item.p,prefs)
  });

  quizData.push({
    q:`${item.p}にある山はどれ？`,
    a:item.n,
    c:makeChoices(item.n,mountainNames)
  });

  quizData.push({
    q:`${item.n}の標高は？`,
    a:item.h,
    c:makeChoices(item.h,heights)
  });

  quizData.push({
    q:`「${item.f}」に当てはまる山は？`,
    a:item.n,
    c:makeChoices(item.n,mountainNames)
  });
});

quizData = quizData.slice(0,200);

let currentQuestion = 0;
let score = 0;
const totalQuestions = 30;
let shuffledQuiz = [];

function startQuiz(){
  shuffledQuiz = shuffle([...quizData]).slice(0,totalQuestions);
  currentQuestion = 0;
  score = 0;
  document.getElementById("score").textContent = score;
  showQuestion();
}

function showQuestion(){
  const q = shuffledQuiz[currentQuestion];

  document.getElementById("questionNum").textContent = currentQuestion + 1;
  document.getElementById("question").textContent = q.q;
  document.getElementById("result").textContent = "";

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  shuffle([...q.c]).forEach(choice=>{
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(btn,choice,q.a);
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(button,selected,correct){
  const buttons = document.querySelectorAll(".choices button");

  buttons.forEach(btn=>{
    btn.disabled = true;
    if(btn.textContent === correct){
      btn.classList.add("correct");
    }
  });

  if(selected === correct){
    score++;
    document.getElementById("score").textContent = score;
    document.getElementById("result").textContent = "正解！";
    button.classList.add("correct");
  }else{
    document.getElementById("result").textContent = "不正解！ 正解は " + correct;
    button.classList.add("wrong");
  }

  setTimeout(()=>{
    currentQuestion++;

    if(currentQuestion < totalQuestions){
      showQuestion();
    }else{
      showFinal();
    }
  },1200);
}

function showFinal(){
  document.getElementById("quizBox").style.display = "none";
  document.getElementById("finalScreen").style.display = "block";
  document.getElementById("finalScore").textContent =
    totalQuestions + "問中 " + score + "問正解！";
}

function restartQuiz(){
  document.getElementById("quizBox").style.display = "block";
  document.getElementById("finalScreen").style.display = "none";
  startQuiz();
}

console.log("総問題数:", quizData.length);

startQuiz();
</script>

</body>
</html>
